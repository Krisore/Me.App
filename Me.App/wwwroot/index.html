<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Me.App</title>
    <base href="/" />
    <link rel="stylesheet" href="./styles/app.min.css" />
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">

    <style>
        /* Container utilizing Neutral Base */
        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background-color: var(--color-neutral-base, #F8F5F2);
            font-family: var(--font-headline, 'Fira Code', monospace);
        }

        /* The .me Logo Block utilizing Primary Slate */
        .logo-block {
            position: relative;
            width: 96px;
            height: 96px;
            background-color: var(--color-primary, #283044);
            color: var(--color-neutral-surface, #FFFFFF);
            font-size: 2.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(40, 48, 68, 0.4); /* Primary shadow */
            animation: float 3s ease-in-out infinite;
            z-index: 10;
        }

        /* Pulsing Glow utilizing Secondary Teal for high contrast */
        .logo-glow {
            position: absolute;
            width: 96px;
            height: 96px;
            background-color: var(--color-secondary, #2DD4BF);
            border-radius: 1rem;
            filter: blur(18px);
            opacity: 0.5;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            z-index: 1;
        }

        /* Elegant Loading Text utilizing Neutral Dark */
        .loading-text {
            margin-top: 2.5rem;
            color: var(--color-neutral-dark, #2D2422);
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            animation: fadeText 1.5s ease-in-out infinite alternate;
        }

        /* Minimalist Progress Bar */
        .progress-track {
            margin-top: 1.25rem;
            width: 150px;
            height: 4px;
            background-color: rgba(40, 48, 68, 0.1); /* Subtle primary track */
            border-radius: 9999px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%;
            background-color: var(--color-secondary, #2DD4BF); /* Teal loading fill */
            border-radius: 9999px;
            animation: slideLoad 1.5s ease-in-out infinite;
        }

        /* --- Animations --- */
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.8;
                transform: scale(1);
            }

            50% {
                opacity: 0.3;
                transform: scale(1.2);
            }
        }

        @keyframes fadeText {
            from {
                opacity: 0.3;
            }

            to {
                opacity: 0.8;
            }
        }

        @keyframes slideLoad {
            0% {
                transform: translateX(-100%);
                width: 30%;
            }

            50% {
                width: 50%;
            }

            100% {
                transform: translateX(250%);
                width: 30%;
            }
        }
    </style>
</head>
<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="splash-container">
            <div style="position: relative; display: flex; justify-content: center; align-items: center;">
                <div class="logo-glow"></div>
                <div class="logo-block">.me</div>
            </div>
            <div class="loading-text">Securing Vault...</div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="_content/Flowbite/flowbite.js"></script>
    <script src="./_scripts/app.js"></script>

</body>
</html>
